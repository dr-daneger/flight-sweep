# price-oracle configuration — terminal-clearance price tracker.
#
# The seed target is the Samsung 83" S95F (US model QN83S95FAEXZA), a Tandem
# WOLED panel in active end-of-life clearance. The engine answers one question
# daily: given the best legitimate net price now, the forecast of future
# achievable prices, and the probability the SKU vanishes first, BUY / WAIT /
# WATCH today? See price-oracle/README.md and the build spec for the framing.
#
# DECISIONS (spec §11) — defaults chosen here, change freely; they are config,
# not code. The two policy-dominant ones are `deadline` and `stockout_penalty`.

currency: USD

# ---------------------------------------------------------------------------
# SKUs to track. The first is the primary buy target; others are watchlist /
# fallback anchors. condition_scope lists which conditions are BUY-eligible
# (open-box + returnable used are in scope per spec §11.4); everything else is
# still logged for price signal but never triggers a BUY.
# ---------------------------------------------------------------------------
skus:
  - sku_key: samsung_s95f_83
    label: Samsung 83" S95F (QN83S95FAEXZA)
    role: primary                 # the buy target
    panel: WOLED
    launch_msrp: 6499.99
    launch_date: "2025-03-01"     # S95F lineup launch (lifecycle clock origin)
    condition_scope: [new, open_box, used, refurb, scratch_dent]
    reference_class: oled_83      # which analog group seeds the lifecycle prior

  - sku_key: samsung_s95f_77
    label: Samsung 77" S95F (QN77S95FAFXZA)
    role: fallback                # resolved primary substitute (spec §11.2)
    panel: QD-OLED
    launch_msrp: 4499.99
    launch_date: "2025-03-01"
    condition_scope: [new, open_box, used, refurb, scratch_dent]
    reference_class: oled_77

# ---------------------------------------------------------------------------
# Decision layer (spec §6.5). The hard override fires the instant any credible,
# return-safe listing lands at/under hard_buy_trigger, bypassing the model.
# ---------------------------------------------------------------------------
decision:
  primary_sku: samsung_s95f_83
  hard_buy_trigger: 3000.0        # net <= this on the primary (any in-scope
                                  # condition passing the §4.4 gates) => BUY now
  # Patience horizon / purchase deadline (spec §11.1). Owner's call: getting a
  # deal is top priority and there is no hard move-in deadline, so this is null —
  # the stopping policy is bounded by the rising stockout hazard (V3), not a
  # calendar date. It will hold out for the deepest 83" deal the survival curve
  # still makes reachable. Set a date here to re-impose a hard deadline.
  deadline: null
  # Fallback economics: cost of NOT securing the primary before it is gone =
  # substitute_price + stockout_penalty (K). The 77" S95F is executable new at
  # ~$2,998 today (spec §11.2), so it caps the regret of missing the 83".
  substitute_price: 2998.0
  stockout_penalty: 800.0         # K (spec §11.3): inconvenience/regret of the
                                  # downgrade to 77" QD-OLED (raised black floor
                                  # in bright rooms, 6" smaller). Tunes BUY
                                  # aggressiveness; higher K => buy sooner.
  mc_paths: 4000                  # Monte-Carlo paths for the stopping policy
  watch_band_pct: 4.0             # within this % of the BUY threshold => WATCH

# ---------------------------------------------------------------------------
# Secondary-market BUY gates (spec §4.4). A listing must clear ALL of these to
# be BUY-eligible; otherwise it is logged for signal only.
# ---------------------------------------------------------------------------
secondary_gates:
  require_returns: true           # free returns / money-back guarantee present
  min_seller_rating: 0.98         # >= 98% positive
  min_seller_volume: 50           # established sales history

# ---------------------------------------------------------------------------
# Value estimator (spec §6.1). Credibility filter rejects implausible lows so a
# scrape error or a typo'd marketplace listing cannot mis-fire a BUY.
# ---------------------------------------------------------------------------
value:
  mad_k: 3.5                      # reject net < median - k*MAD unless corroborated
  min_corroboration: 2            # sources agreeing within tol to trust a low
  corroboration_tol_pct: 3.0

# ---------------------------------------------------------------------------
# Forecaster (spec §6.3 fallback path). prior_halflife_obs controls how fast
# the reference-class prior's weight decays as live observations accrue — this
# is the concrete, auditable form of "improves over time".
# ---------------------------------------------------------------------------
forecast:
  prior_halflife_obs: 30          # live obs at which prior/data weight is 50/50
  horizon_days: 300               # with no deadline, look ~10 months out so the
                                  # deep EOL troughs (Black Friday, Q1 clearance)
                                  # are in view; survival discounts the far tail
  quantiles: [0.05, 0.25, 0.5, 0.75, 0.95]
  student_t_df: 4                 # heavy-tailed obs noise, robust to scrape outliers

# ---------------------------------------------------------------------------
# Stockout / EOL hazard (spec §6.4). Baseline discrete-time hazard rises sharply
# after the successor ships; live in-stock transitions update it.
# ---------------------------------------------------------------------------
hazard:
  baseline_daily_hazard: 0.001    # pre-successor permanent-EOL hazard per day
  successor_hazard_mult: 12.0     # multiplier once successor has shipped
  stockout_low_signal: true       # treat a stockout right after a low as a
                                  # left-censored "true clearing price <= last seen"

# ---------------------------------------------------------------------------
# Storage (spec §5.5). DuckDB over date-partitioned Parquet. Persistence target
# = commit Parquet to this branch (simplest, self-contained, matches how
# flight-sweep commits its history). The store.py layer is the adapter seam:
# swapping to an R2/S3 bucket later is a config change here, not a rewrite.
# ---------------------------------------------------------------------------
storage:
  backend: parquet_local
  data_dir: data                  # relative to price-oracle/

# ---------------------------------------------------------------------------
# Alerting (spec §9). Default channel = GitHub Issue (in-repo, free); the
# workflow opens/updates one from the alert.json this job writes. Set
# ALERT_WEBHOOK_URL to also POST to Slack/Discord/ntfy.
# ---------------------------------------------------------------------------
alerts:
  channel: github_issue
  fire_on: [buy_verdict, threshold_cross, data_anomaly]

# ---------------------------------------------------------------------------
# Live scrape sources (JSON-LD tier). Populated here so `--source auto` (and
# the daily workflow) fetches real prices without any code changes. Each entry
# must name the sku_key it tracks so the runner can route it correctly.
# Adding a source is purely config; removing one degrades coverage, not
# correctness — a missing source is logged, not fatal (spec §4.1).
# ---------------------------------------------------------------------------
live_sources:
  # ── 83" S95F (primary buy target) ────────────────────────────────────────
  - sku_key: samsung_s95f_83
    source_id: bestbuy_83
    tier: jsonld
    url: "https://www.bestbuy.com/site/samsung-83-class-s95f-series-oled-4k-uhd-samsungvision-ai-smart-tizen-tv-2025/6614339.p?skuId=6614339"

  - sku_key: samsung_s95f_83
    source_id: samsung_com_83
    tier: jsonld
    url: "https://www.samsung.com/us/tvs/oled-tv/83-class-oled-tv-s95f-sku-qn83s95faexza/"

  # ── 77" S95F (fallback / substitute price anchor) ────────────────────────
  - sku_key: samsung_s95f_77
    source_id: bestbuy_77
    tier: jsonld
    url: "https://www.bestbuy.com/site/samsung-77-class-s95f-series-oled-4k-uhd-samsungvision-ai-smart-tizen-tv-2025/6613459.p?skuId=6613459"

  - sku_key: samsung_s95f_77
    source_id: samsung_com_77
    tier: jsonld
    url: "https://www.samsung.com/us/tvs/oled-tv/77-class-oled-tv-s95f-sku-qn77s95fafxza/"

# Paid data (Keepa) and residential proxies are OFF by default (spec §11.5/6):
# coverage is intentionally partial. Set KEEPA_API_KEY / PROXY_URL secrets and
# flip these to enable.
paid_data:
  keepa: false
proxy:
  enabled: false
